# ── virlink · Bonded GRE-FOU · CLIENT (81.12.35.242) ─────────────────────────
# Two parallel GRE-FOU paths with ECMP → 2× bandwidth
#
# Requires:  apt install linux-modules-extra-$(uname -r)
# Usage:     sudo ./virlink -c config.toml
# Overlay:   this host → 10.20.10.1/24
# ─────────────────────────────────────────────────────────────────────────────

[tunnel]
type      = "bonded-gre-fou"
mode      = "client"
local_ip  = "81.12.35.242"
remote_ip = "5.75.206.15"
cidr      = "10.20.10.0/24"
mtu       = 1400

[transport]
port  = 5557
port2 = 5558
proto = "fou"

[security]
encryption = false

[tuning]
bbr          = true
multipath    = true
channel_size = 10_000

[logging]
level = "info"

# ── port forwarding (client-only) ─────────────────────────────────────────────
[forward]
enabled = false
rules = [
  # "1000:2000",
  # "8080:80/tcp",
  # "53:53/udp",
]
