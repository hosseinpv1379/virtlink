# ── virlink · GRE-FOU · SERVER (5.75.206.15) ─────────────────────────────────
# Usage:  sudo ./virlink -c config.toml
# Overlay: this host → 10.20.10.2/24
# ─────────────────────────────────────────────────────────────────────────────

[tunnel]
type      = "gre-fou"
mode      = "server"
local_ip  = "5.75.206.15"
remote_ip = "81.12.35.242"
cidr      = "10.20.10.0/24"
mtu       = 1420

[transport]
port               = 5556
proto              = "fou"
heartbeat_interval = 10

[security]
encryption = false

[tuning]
enabled      = true
mode         = "balanced"     # balanced | fast | resource | latency
multipath    = false
# sock_buf_mb  = 32           # socket buffer MB  (1–128, default = 32)
# tun_queues   = 4            # TUN readers       (1–16,  default = CPU count, max 4)
# batch_size   = 32           # ICMP sendmmsg     (1–128, default = 32)
# tx_queue_len = 10000        # TUN txqueuelen    (100–100000, default from mode)
# poll_ms      = 10           # idle poll timeout (1–1000, adaptive backoff up to 50 ms)
# tcp_streams  = 4            # TCP streams       (1–16,  default = tun_queues)
channel_size = 10_000

[logging]
level             = "info"
profile           = true
profile_interval  = 30
