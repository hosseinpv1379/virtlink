# ── virlink · GRE-FOU · SERVER (5.75.206.15) ─────────────────────────────────
# Usage:  sudo ./virlink -c config.toml
# Overlay: this host → 10.20.10.2/24
# ─────────────────────────────────────────────────────────────────────────────

[tunnel]
type      = "gre-fou"
mode      = "server"
local_ip  = "5.75.206.15"
remote_ip = "81.12.35.242"
cidr      = "10.20.10.0/24"
mtu       = 1420

[transport]
port               = 5556
proto              = "fou"
heartbeat_interval = 10

[security]
encryption = false

[tuning]
enabled       = true
mode          = "fast"        # balanced | fast | resource | latency
multipath     = false
sock_buf_mb   = 128           # max socket buffer (MB)
tun_queues    = 16            # max TUN readers
batch_size    = 128           # max ICMP sendmmsg batch
tx_queue_len  = 100000        # max TUN txqueuelen
poll_ms       = 1             # min poll timeout (most aggressive)
tcp_streams   = 16            # max TCP parallel streams
channel_size  = 10_000

[logging]
level = "info"
