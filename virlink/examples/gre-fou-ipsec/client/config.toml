# ── virlink · GRE-FOU-IPsec · CLIENT (81.12.35.242) ──────────────────────────
# GRE-FOU with IPsec ESP transport-mode encryption
#
# ⚠  Replace ALL keys with random values:
#    python3 -c "import os,sys; sys.stdout.write('0x'+os.urandom(32).hex())"
#
# Usage:   sudo ./virlink -c config.toml
# Overlay: this host → 10.20.10.1/24
# ─────────────────────────────────────────────────────────────────────────────

[tunnel]
type      = "gre-fou-ipsec"
mode      = "client"
local_ip  = "81.12.35.242"
remote_ip = "5.75.206.15"
cidr      = "10.20.10.0/24"
mtu       = 1380

[transport]
port  = 5556
proto = "fou"

[security]
encryption   = true
spi_out      = "0x00000002"
spi_in       = "0x00000001"
enc_key_out  = "0x2f2e2d2c2b2a29282726252423222120201f1e1d1c1b1a191817161514131211"
enc_key_in   = "0x0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20"
auth_key_out = "0xb2a1f0e9d8c7b6a5f4e3d2c1b0a9f8e7d6c5b4a3f2e1d0c9b8a7f6e5d4c3b2a1"
auth_key_in  = "0xa1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2"

[tuning]
bbr          = true
multipath    = false
channel_size = 10_000

[logging]
level = "info"

# ── port forwarding (client-only) ─────────────────────────────────────────────
[forward]
enabled = false
rules = [
