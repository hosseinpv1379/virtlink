# ── virlink · VXLAN-WireGuard · CLIENT (81.12.35.242) ────────────────────────
# VXLAN L2 bridge inside WireGuard encryption
#
# Step 1:  ./virlink keygen   → copy keys below
# Usage:   sudo ./virlink -c config.toml
# Overlay: this host → 10.20.10.1/24
# ─────────────────────────────────────────────────────────────────────────────

[tunnel]
type      = "vxlan-wg"
mode      = "client"
local_ip  = "81.12.35.242"
remote_ip = "5.75.206.15"
cidr      = "10.20.10.0/24"
mtu       = 1360

[transport]
port  = 51821
proto = "wireguard"

[wireguard]
client_private_key = "REPLACE_CLIENT_PRIVATE_KEY"
client_public_key  = "REPLACE_CLIENT_PUBLIC_KEY"
server_private_key = "REPLACE_SERVER_PRIVATE_KEY"
server_public_key  = "REPLACE_SERVER_PUBLIC_KEY"
vni = 100

[security]
encryption = true

[tuning]
bbr          = true
multipath    = false
channel_size = 10_000

[logging]
level = "info"

# ── port forwarding (client-only) ─────────────────────────────────────────────
[forward]
enabled = false
rules = [
  # "1000:2000",
  # "8080:80/tcp",
  # "53:53/udp",
]
