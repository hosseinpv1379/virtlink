# ── virlink · Bonded GRE-FOU · SERVER (5.75.206.15) ──────────────────────────
# Two parallel GRE-FOU paths with ECMP → 2× bandwidth
#
# Requires:  apt install linux-modules-extra-$(uname -r)
# Usage:     sudo ./virlink -c config.toml
# Overlay:   this host → 10.20.10.2/24
# ─────────────────────────────────────────────────────────────────────────────

[tunnel]
type      = "bonded-gre-fou"
mode      = "server"
local_ip  = "5.75.206.15"
remote_ip = "81.12.35.242"
cidr      = "10.20.10.0/24"
mtu       = 1400

[transport]
port  = 5557
port2 = 5558
proto = "fou"

[security]
encryption = false

[tuning]
bbr          = true
multipath    = true
channel_size = 10_000

[logging]
level = "info"
