# virlink — Hysteria2 client example
# Copy /opt/virlink/pki/site1/export/ from the server before starting.
[tunnel]
type      = "hysteria2"
mode      = "client"
local_ip  = "198.51.100.20"
remote_ip = "203.0.113.10"
cidr      = "10.20.10.0/24"
mtu       = 1400
name      = "site1"

[transport]
port               = 443
proto              = "udp"
heartbeat_interval = 20

[hysteria2]
config = "/opt/virlink/pki/site1/client.yaml"
dev    = "hy2-tun0"

[security]
encryption = true
