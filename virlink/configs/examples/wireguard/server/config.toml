# ── virlink · WireGuard · SERVER ─────────────────────────────────────────────
# Generate with: sudo virlink-setup → userspace → wireguard
#
# Usage:   sudo virlink -c config.toml
# Overlay: server → 10.99.0.2/24  ·  client peer → 10.99.0.1
# ─────────────────────────────────────────────────────────────────────────────

[tunnel]
type      = "wireguard"
mode      = "server"
local_ip  = "203.0.113.10"
remote_ip = "198.51.100.20"
cidr      = "10.99.0.0/24"
mtu       = 1420
name      = "site1"

[transport]
port               = 51820
proto              = "udp"
heartbeat_interval = 20

[wireguard]
config = "/opt/virlink/pki/site1/wg-server.conf"
dev    = "wg-virlink0"

[security]
encryption = true

[tuning]
enabled      = true
mode         = "fast"
tx_queue_len = 10000
poll_ms      = 50

[logging]
level = "info"

[health]
disabled = false
port     = 6543

[forward]
enabled = false
rules = []
