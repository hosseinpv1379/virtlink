# ── virlink · GRE-FOU · CLIENT (81.12.35.242) ────────────────────────────────
# Usage:  sudo ./virlink -c config.toml
# Overlay: this host → 10.20.10.1/24
# ─────────────────────────────────────────────────────────────────────────────

[tunnel]
type      = "gre-fou"
mode      = "client"
local_ip  = "81.12.35.242"
remote_ip = "5.75.206.15"
cidr      = "10.20.10.0/24"
mtu       = 1420

[transport]
port               = 5556
proto              = "fou"
heartbeat_interval = 10    # print status every 10 seconds

[security]
encryption = false

[tuning]
bbr          = true
multipath    = false
channel_size = 10_000

[logging]
level = "info"

# ── port forwarding (client-only) ─────────────────────────────────────────────
# Traffic arriving on listenPort is DNAT'd to peerIP:targetPort (tcp+udp).
# Format: "listenPort:targetPort"  or  "listenPort:targetPort/tcp"
#
[forward]
enabled = false
rules = [
  # "1000:2000",       # :1000  →  peerIP:2000  (tcp+udp)
  # "8080:80/tcp",     # :8080  →  peerIP:80    (tcp only)
  # "53:53/udp",       # :53    →  peerIP:53    (udp only)
]
